name: Model ML CI/CD

#Definicja zdarzeń, które uruchamiają workflow
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

#Uprawnienia potrzebne do zapisu obrazu w GitHub Container Registry
permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      #Instalacja zależności z pliku requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      #Uruchomienie testów jednostkowych
      - name: Run tests
        run: pytest test_model.py

  build-and-push-docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          #Nazwa obrazu identyczna do nazwy repozytorium
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
